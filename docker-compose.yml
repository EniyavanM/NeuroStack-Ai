services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://neurostack:neurostack@postgres:5432/neurostack
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/data/chroma
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - neurostack_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neurostack
      POSTGRES_PASSWORD: neurostack
      POSTGRES_DB: neurostack
    ports:
      - "5433:5432"  # host 5433 avoids conflict with local PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurostack -d neurostack"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  neurostack_data:
